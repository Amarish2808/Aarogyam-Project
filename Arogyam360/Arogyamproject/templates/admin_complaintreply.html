{% include 'admin_header.html' %}

<style>

/* Layout */
.admin-main {
    margin-left: var(--sidebar-width);
    margin-top: var(--header-height);
    padding: 2rem;
    min-height: calc(100vh - var(--header-height));
    background: var(--bg-primary);
    transition: var(--transition);
}

.admin-main.sidebar-collapsed {
    margin-left: var(--sidebar-collapsed-width);
}

/* Banner */
.page-banner {
    background: linear-gradient(135deg, #e0e0e0 0%, #808080 100%);
    color: #000;
    padding: 2.5rem;
    border-radius: 20px;
    margin-bottom: 2rem;
    box-shadow: var(--shadow-lg);
}

.banner-content {
    display: flex;
    align-items: center;
    gap: 1.5rem;
}

.banner-icon {
    width: 60px;
    height: 60px;
    background: rgba(0,0,0,0.15);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.7rem;
}

.banner-title {
    font-size: 2rem;
    font-weight: 700;
}

.banner-subtitle {
    font-size: 1rem;
    opacity: 0.8;
}

/* Card Form */
.form-card {
    max-width: 600px;
    margin: auto;
    background: var(--bg-card);
    border-radius: 20px;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--border-light);
    overflow: hidden;
}

.card-header {
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--border-light);
    font-weight: 700;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    gap: .6rem;
}

.card-body {
    padding: 2rem;
}

/* Form */
.form-group {
    margin-bottom: 1.5rem;
}

.form-label {
    display: block;
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    margin-bottom: .5rem;
}

.form-control {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1px solid var(--border-medium);
    border-radius: 10px;
    font-size: 0.9rem;
    background: var(--bg-primary);
    transition: var(--transition);
    outline: none;
}

.form-control:focus {
    border-color: #888;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(136,136,136,0.12);
}

/* Button */
.btn-submit {
    width: 100%;
    padding: 0.9rem;
    background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .5rem;
}

.btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
}

/* Responsive */
@media (max-width:768px) {
    .admin-main { margin-left:0; padding:1.2rem; }
    .banner-title { font-size:1.5rem; }
}

</style>


<main class="admin-main" id="adminMain">

    <!-- Banner -->
    <section class="page-banner">
        <div class="banner-content">
            <div class="banner-icon">
                <i class="fas fa-reply"></i>
            </div>
            <div>
                <h2 class="banner-title">Reply to Complaint</h2>
                <p class="banner-subtitle">Send a response to the user complaint</p>
            </div>
        </div>
    </section>

    <!-- Form Card -->
    <div class="form-card">

        <div class="card-header">
            <i class="fas fa-envelope-open-text"></i>
            Send Reply
        </div>

        <div class="card-body">
            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label class="form-label">Reply Message</label>
                    <input type="text" name="reply" placeholder="Type your reply here..." required class="form-control">
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-paper-plane"></i> Send Reply
                </button>
            </form>
        </div>
    </div>

</main>


<script>
const adminMain = document.getElementById('adminMain');
const adminFooter = document.getElementById('adminFooter');
const sidebar = document.getElementById('sidebar');

if (sidebar && adminMain && adminFooter) {
    const observer = new MutationObserver(() => {
        const collapsed = sidebar.classList.contains('collapsed');
        adminMain.classList.toggle('sidebar-collapsed', collapsed);
        adminFooter.classList.toggle('sidebar-collapsed', collapsed);
    });
    observer.observe(sidebar, { attributes: true });
}
</script>
